# Same frontend + backend for everyone: one command, identical versions.
# Open http://localhost:3000 after `docker compose up --build`

services:
  backend:
    build: ./backend
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PORT: "8080"
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
